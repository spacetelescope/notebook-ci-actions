name: Sync consumer files to notebook-ci-template

# Mirrors the consumer-facing files from this repo at the v1 tag into
# spacetelescope/notebook-ci-template, so repos created from the template ship
# the current helper scripts and examples. Runs on each v1 release, and can be
# run manually (workflow_dispatch) for the first/bootstrap sync.

on:
  push:
    tags: ["v1*"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Generate a token from the GitHub App
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.SYNC_APP_ID }}
          private-key: ${{ secrets.SYNC_APP_PRIVATE_KEY }}
          owner: spacetelescope
          repositories: notebook-ci-template

      - name: Check out notebook-ci-actions @v1 (source)
        uses: actions/checkout@v4
        with:
          ref: v1
          path: source

      - name: Check out notebook-ci-template (target)
        uses: actions/checkout@v4
        with:
          repository: spacetelescope/notebook-ci-template
          path: template
          token: ${{ steps.app-token.outputs.token }}

      - name: Mirror consumer files from @v1
        run: |
          cd source
          for p in scripts examples QUICK_START.md ci_config.txt; do
            [ -e "$p" ] || continue
            mkdir -p "../template/$(dirname "$p")"
            rsync -a --delete "$p" "../template/$(dirname "$p")/"
          done

      - name: Open sync PR in the template
        uses: peter-evans/create-pull-request@v6
        with:
          path: template
          token: ${{ steps.app-token.outputs.token }}
          branch: sync/from-notebook-ci-actions
          title: "Sync consumer files from notebook-ci-actions@v1"
          commit-message: "Sync consumer files from notebook-ci-actions@v1"
          body: |
            Automated sync of consumer-facing files from `notebook-ci-actions@v1`:
            `scripts/`, `examples/`, `QUICK_START.md`, `ci_config.txt`.

            Opened by the `notebook-ci-sync` GitHub App.
          reviewers: |
            bgannon2
            mgough-970
          delete-branch: true
